<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>THE SPIRE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Barlow Condensed',sans-serif;}

#canvas{position:fixed;inset:0;width:100%;height:100%;display:block;}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:100;
  background:radial-gradient(ellipse at 50% 30%,#1a1a2e 0%,#000 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .6s;
}
#splash h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(4rem,18vw,7rem);
  letter-spacing:.15em;
  color:#fff;
  text-shadow:0 0 60px rgba(100,200,255,.4),0 0 120px rgba(100,200,255,.15);
  margin-bottom:.1em;
}
#splash .tagline{
  font-size:clamp(.9rem,3.5vw,1.2rem);
  font-weight:300;letter-spacing:.4em;text-transform:uppercase;
  color:rgba(255,255,255,.45);margin-bottom:3.5rem;
}
.altitude{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1rem,4vw,1.4rem);letter-spacing:.2em;
  color:rgba(100,200,255,.7);margin-bottom:2.5rem;
}
#startBtn{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(1.1rem,4.5vw,1.5rem);letter-spacing:.25em;
  padding:14px 52px;border:1px solid rgba(255,255,255,.3);border-radius:2px;
  background:rgba(255,255,255,.06);color:#fff;cursor:pointer;
  backdrop-filter:blur(4px);
  box-shadow:0 0 40px rgba(100,200,255,.15);
  transition:background .2s,box-shadow .2s;
}
#startBtn:active{background:rgba(255,255,255,.15);}

/* ── PERM BANNER ── */
#permBanner{
  position:fixed;inset:0;z-index:200;
  background:radial-gradient(ellipse at 50% 30%,#1a1a2e,#000 70%);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
#permBanner.show{display:flex;}
#permBanner h2{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.15em;color:#fff;margin-bottom:.8rem;}
#permBanner p{font-weight:300;font-size:1rem;letter-spacing:.1em;color:rgba(255,255,255,.5);margin-bottom:2.5rem;max-width:280px;line-height:1.7;}
#permBtn{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.25em;
  padding:14px 48px;border:1px solid rgba(255,255,255,.3);border-radius:2px;
  background:rgba(255,255,255,.07);color:#fff;cursor:pointer;
}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  padding:14px 20px;display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;
}
.hud-box{display:flex;flex-direction:column;gap:2px;}
.hud-label{font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(255,255,255,.3);}
.hud-value{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:.1em;color:#fff;}
#balanceBar{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:18px 24px;pointer-events:none;
  display:flex;flex-direction:column;gap:6px;
}
.bar-label{font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3);text-align:center;}
.bar-track{height:4px;background:rgba(255,255,255,.1);border-radius:2px;position:relative;overflow:visible;}
.bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,#f59e0b,#ef4444);transition:width .05s;}
.bar-center{position:absolute;top:-3px;left:50%;width:2px;height:10px;background:rgba(255,255,255,.4);transform:translateX(-50%);}
.bar-cursor{
  position:absolute;top:-6px;width:4px;height:16px;
  background:#fff;border-radius:1px;transform:translateX(-50%);
  transition:left .05s;box-shadow:0 0 8px rgba(255,255,255,.8);
}

/* ── OVERLAY ── */
#overlay{
  position:fixed;inset:0;z-index:50;
  background:rgba(0,0,0,.82);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);
}
#overlay.show{display:flex;}
#overlay .over-big{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,14vw,5.5rem);
  letter-spacing:.12em;color:#fff;text-shadow:0 0 60px rgba(239,68,68,.5);margin-bottom:.3em;}
#overlay .over-sub{font-weight:300;font-size:clamp(.9rem,3.5vw,1.1rem);letter-spacing:.3em;
  text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:2.5rem;}
#overlay .over-score{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,5vw,2rem);
  letter-spacing:.15em;color:rgba(100,200,255,.9);margin-bottom:2.5rem;}
#retryBtn{
  font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.25em;
  padding:14px 48px;border:1px solid rgba(255,255,255,.3);border-radius:2px;
  background:rgba(255,255,255,.07);color:#fff;cursor:pointer;
}
</style>
</head>
<body>

<div id="splash">
  <h1>THE SPIRE</h1>
  <div class="tagline">828 metres above the ground</div>
  <div class="altitude">Burj Khalifa · Dubai</div>
  <button id="startBtn">CLIMB TO THE TOP</button>
</div>

<div id="permBanner">
  <h2>ALLOW MOTION</h2>
  <p>This game requires your device's gyroscope to keep your balance on the spire.</p>
  <button id="permBtn">GRANT ACCESS</button>
</div>

<div id="hud">
  <div class="hud-box">
    <span class="hud-label">Altitude</span>
    <span class="hud-value" id="altDisplay">828m</span>
  </div>
  <div class="hud-box" style="align-items:center;">
    <span class="hud-label">Survived</span>
    <span class="hud-value" id="timeDisplay">0s</span>
  </div>
  <div class="hud-box" style="align-items:flex-end;">
    <span class="hud-label">Wind</span>
    <span class="hud-value" id="windDisplay">12 km/h</span>
  </div>
</div>

<canvas id="canvas"></canvas>

<div id="balanceBar">
  <div class="bar-label">BALANCE</div>
  <div class="bar-track" id="barTrackX">
    <div class="bar-center"></div>
    <div class="bar-cursor" id="barCursorX" style="left:50%"></div>
  </div>
  <div class="bar-track" id="barTrackY" style="margin-top:4px;">
    <div class="bar-center"></div>
    <div class="bar-cursor" id="barCursorY" style="left:50%"></div>
  </div>
</div>

<div id="overlay">
  <div class="over-big" id="overBig">YOU FELL</div>
  <div class="over-sub" id="overSub">828 metres straight down</div>
  <div class="over-score" id="overScore">0 seconds</div>
  <button id="retryBtn">TRY AGAIN</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CANVAS + GLOBALS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
//  GYRO / TILT STATE
// ═══════════════════════════════════════════════════════════
let tiltX=0, tiltY=0;      // -1 to 1 lean
let gyroEnabled=false;

// camera lean (smooth)
let camLeanX=0, camLeanY=0;  // accumulated lean from physics
let camVX=0,    camVY=0;     // lean velocity

// ═══════════════════════════════════════════════════════════
//  CITY BUILDINGS  (random seed, generated once)
// ═══════════════════════════════════════════════════════════
const rng=(()=>{ let s=42; return ()=>{ s=(s*1664525+1013904223)&0xffffffff; return (s>>>0)/0xffffffff; }; })();

const NUM_BUILDINGS = 260;
const buildings = [];
for(let i=0;i<NUM_BUILDINGS;i++){
  const angle = rng()*Math.PI*2;
  const dist  = 120 + rng()*1800;
  buildings.push({
    angle,
    dist,
    width:  18 + rng()*80,
    depth:  18 + rng()*80,
    height: 20 + rng()*280,
    hue:    200 + rng()*40,
    lit:    rng()>0.45,
    litCol: `hsl(${40+rng()*20},${60+rng()*30}%,${60+rng()*20}%)`,
  });
}

// Road grid lines (top-down, radial + grid)
const ROADS = [];
for(let i=0;i<12;i++) ROADS.push({ angle: i/12*Math.PI*2, radial:true });
for(let i=0;i<5;i++){
  const r=200+i*300;
  ROADS.push({ r, radial:false });
}

// ═══════════════════════════════════════════════════════════
//  WIND
// ═══════════════════════════════════════════════════════════
let windX=0, windY=0;
let windTimer=0;
let windSpeed=12;
function updateWind(dt){
  windTimer+=dt;
  if(windTimer>3+Math.random()*4){
    windTimer=0;
    windX=(Math.random()-.5)*0.28;
    windY=(Math.random()-.5)*0.18;
    windSpeed=Math.round(8+Math.random()*20);
    document.getElementById('windDisplay').textContent=windSpeed+' km/h';
  }
}

// ═══════════════════════════════════════════════════════════
//  PARTICLES (wind streaks)
// ═══════════════════════════════════════════════════════════
const windParticles=[];
function spawnWind(){
  if(windParticles.length>60) return;
  windParticles.push({
    x: Math.random()*W, y: Math.random()*H*0.6,
    len: 30+Math.random()*80,
    speed: 2+Math.random()*4,
    angle: Math.atan2(windY||.1,windX||.2)+( Math.random()-.5)*.4,
    alpha: .05+Math.random()*.12,
    life:1, decay:.015+Math.random()*.025
  });
}
function updateWindParticles(){
  for(const p of windParticles){
    p.x+=Math.cos(p.angle)*p.speed;
    p.y+=Math.sin(p.angle)*p.speed;
    p.life-=p.decay;
  }
  windParticles.splice(0,windParticles.length,...windParticles.filter(p=>p.life>0));
  if(Math.random()<.35) spawnWind();
}
function drawWindParticles(){
  ctx.save();
  for(const p of windParticles){
    ctx.globalAlpha=p.alpha*p.life;
    ctx.strokeStyle='#a0c8ff';
    ctx.lineWidth=.7;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y);
    ctx.lineTo(p.x-Math.cos(p.angle)*p.len, p.y-Math.sin(p.angle)*p.len);
    ctx.stroke();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════
let gameRunning=false;
let survived=0;
let fallAnim=0;  // 0=none, >0=falling
let bestTime=0;

// ═══════════════════════════════════════════════════════════
//  PERSPECTIVE PROJECTION
//  We look STRAIGHT DOWN. camLeanX/Y tilt the horizon.
//  Buildings are drawn as top-down rectangles with
//  a perspective-foreshortened view.
// ═══════════════════════════════════════════════════════════

// Project world XZ → screen XY
// camLean shifts the vanishing point, giving the lean effect
function project(worldX, worldZ, altitude){
  // altitude = how high above ground (828m for spire top)
  const FOCAL = H * 0.82;
  const groundDist = altitude; // metres above ground

  // lean shifts apparent horizon
  const vanishX = W/2 + camLeanX * W * 0.55;
  const vanishY = H/2 + camLeanY * H * 0.55;

  // perspective scale: things at worldZ=0 (ground) fill screen
  // things far away shrink
  const scale = FOCAL / (groundDist + worldZ*0.001 + 0.001);

  const sx = vanishX + worldX * scale * 0.0016;
  const sy = vanishY + worldZ * scale * 0.0016;  // Z is depth away

  return {sx, sy, scale};
}

// ═══════════════════════════════════════════════════════════
//  DRAW SCENE
// ═══════════════════════════════════════════════════════════
let frame=0;
function draw(){
  frame++;

  // ── Background sky / haze ──
  const skyGrad = ctx.createRadialGradient(W/2,H/2,0, W/2,H/2,Math.max(W,H)*0.75);
  skyGrad.addColorStop(0,'#c8d8f0');
  skyGrad.addColorStop(0.35,'#a0b8d8');
  skyGrad.addColorStop(0.7,'#6080a0');
  skyGrad.addColorStop(1,'#2a3a50');
  ctx.fillStyle=skyGrad;
  ctx.fillRect(0,0,W,H);

  // ── Atmospheric haze circle (ground far below) ──
  const cx = W/2 + camLeanX*W*0.55;
  const cy = H/2 + camLeanY*H*0.55;

  // Ground plane — huge blurred oval at vanishing point
  const groundGrad = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*1.1);
  groundGrad.addColorStop(0,'rgba(180,190,180,0.55)');
  groundGrad.addColorStop(0.2,'rgba(140,155,140,0.45)');
  groundGrad.addColorStop(0.5,'rgba(90,105,90,0.3)');
  groundGrad.addColorStop(1,'rgba(40,50,60,0)');
  ctx.fillStyle=groundGrad;
  ctx.beginPath();
  ctx.ellipse(cx,cy, Math.min(W,H)*1.1, Math.min(W,H)*0.62, 0,0,Math.PI*2);
  ctx.fill();

  // ── Draw roads ──
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.strokeStyle='#f0ead0';
  ctx.lineWidth=1.2;
  for(const road of ROADS){
    if(road.radial){
      // radial lines from center outward
      const bx=Math.cos(road.angle)*3000, bz=Math.sin(road.angle)*3000;
      const p0=project(0,0,828);
      const p1=project(bx,bz,828);
      ctx.beginPath();
      ctx.moveTo(p0.sx,p0.sy);
      ctx.lineTo(p1.sx,p1.sy);
      ctx.stroke();
    } else {
      // concentric ring roads
      ctx.beginPath();
      for(let a=0;a<=Math.PI*2;a+=0.12){
        const bx=Math.cos(a)*road.r, bz=Math.sin(a)*road.r;
        const p=project(bx,bz,828);
        if(a===0) ctx.moveTo(p.sx,p.sy); else ctx.lineTo(p.sx,p.sy);
      }
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();

  // ── Draw buildings (sorted back to front) ──
  // Sort by dist desc so closer ones overdraw
  const sorted=[...buildings].sort((a,b)=>b.dist-a.dist);

  for(const b of sorted){
    const wx=Math.cos(b.angle)*b.dist;
    const wz=Math.sin(b.angle)*b.dist;

    const ALTITUDE=828;
    const p=project(wx,wz,ALTITUDE);

    if(p.sx<-200||p.sx>W+200||p.sy<-200||p.sy>H+200) continue;

    const scaledW=b.width*p.scale*0.0016;
    const scaledD=b.depth*p.scale*0.0016;
    const scaledH=b.height*p.scale*0.0016*0.4; // height perspective

    if(scaledW<1.5) continue;

    // Top face (roof) — flat from above
    ctx.fillStyle=`hsl(${b.hue},18%,${28+b.height*0.04}%)`;
    ctx.fillRect(p.sx-scaledW/2, p.sy-scaledD/2, scaledW, scaledD);

    // Side faces give 3D illusion
    // Left shadow face
    ctx.fillStyle=`hsla(${b.hue},15%,15%,0.55)`;
    ctx.beginPath();
    ctx.moveTo(p.sx-scaledW/2, p.sy+scaledD/2);
    ctx.lineTo(p.sx-scaledW/2, p.sy+scaledD/2+scaledH);
    ctx.lineTo(p.sx+scaledW/2, p.sy+scaledD/2+scaledH);
    ctx.lineTo(p.sx+scaledW/2, p.sy+scaledD/2);
    ctx.fill();

    // Windows glow on lit buildings
    if(b.lit && scaledW>4){
      ctx.globalAlpha=0.35;
      ctx.fillStyle=b.litCol;
      const cols=Math.max(1,Math.floor(scaledW/3));
      const rows=Math.max(1,Math.floor(scaledD/3));
      for(let r=0;r<rows;r++) for(let cc=0;cc<cols;cc++){
        if(Math.random()<0.55){
          ctx.fillRect(
            p.sx-scaledW/2+cc*(scaledW/cols)+0.5,
            p.sy-scaledD/2+r*(scaledD/rows)+0.5,
            scaledW/cols-0.8, scaledD/rows-0.8
          );
        }
      }
      ctx.globalAlpha=1;
    }
  }

  // ── Dubai haze / smog layer ──
  const hazeGrad=ctx.createRadialGradient(cx,cy+H*.05,0,cx,cy,H*.7);
  hazeGrad.addColorStop(0,'rgba(210,200,175,0.0)');
  hazeGrad.addColorStop(0.5,'rgba(180,170,140,0.12)');
  hazeGrad.addColorStop(1,'rgba(150,140,110,0.35)');
  ctx.fillStyle=hazeGrad;
  ctx.fillRect(0,0,W,H);

  // ── Wind streaks ──
  drawWindParticles();

  // ── Spire / platform ──
  drawSpire();

  // ── Vignette (darkness at edges for vertigo) ──
  const vig=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,Math.max(W,H)*.78);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.72)');
  ctx.fillStyle=vig;
  ctx.fillRect(0,0,W,H);

  // ── Fall animation overlay ──
  if(fallAnim>0){
    ctx.fillStyle=`rgba(0,0,0,${Math.min(1,fallAnim*0.035)})`;
    ctx.fillRect(0,0,W,H);
    // zoom rush effect
    const zoomGrad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.5);
    zoomGrad.addColorStop(0,'rgba(255,255,255,0)');
    zoomGrad.addColorStop(1,`rgba(255,255,255,${Math.min(.15,fallAnim*.003)})`);
    ctx.fillStyle=zoomGrad;
    ctx.fillRect(0,0,W,H);
  }
}

function drawSpire(){
  const cx = W/2 + camLeanX*W*0.18;
  const cy = H/2 + camLeanY*H*0.18;
  const lean = Math.sqrt(camLeanX*camLeanX + camLeanY*camLeanY);

  // ── How far down the building structure extends below us ──
  // The Burj Khalifa tapers in a series of setback tiers as you
  // look down. We render them foreshortened — biggest at bottom,
  // converging toward us at top.
  const totalDepth = H * 1.05;   // how far down the structure goes

  // Tier definitions: { yFrac (0=us, 1=bottom), halfW, halfD, alpha }
  // Modelled on Burj Khalifa's actual stepped cross-section
  const tiers = [
    { y:1.00, hw:0.310, hd:0.220, col:'#5a6a5a' },  // base / podium
    { y:0.88, hw:0.220, hd:0.155, col:'#6a7a6a' },
    { y:0.74, hw:0.165, hd:0.115, col:'#788878' },
    { y:0.60, hw:0.120, hd:0.085, col:'#8090a0' },
    { y:0.47, hw:0.088, hd:0.062, col:'#8898a8' },
    { y:0.35, hw:0.062, hd:0.044, col:'#90a0b0' },
    { y:0.24, hw:0.042, hd:0.030, col:'#98a8b8' },
    { y:0.15, hw:0.026, hd:0.019, col:'#a0b0c0' },
    { y:0.08, hw:0.015, hd:0.011, col:'#b0bec8' },
    { y:0.03, hw:0.007, hd:0.005, col:'#c0ccd4' },
  ];

  ctx.save();

  // ── Draw tiers back-to-front (bottom first) ──
  for(let i=0; i<tiers.length; i++){
    const t  = tiers[i];
    const t2 = tiers[i+1] || { y:0, hw:0.003, hd:0.002 };

    const y1 = cy + t.y  * totalDepth;
    const y2 = cy + t2.y * totalDepth;

    const w1 = t.hw  * W * 2;
    const w2 = t2.hw * W * 2;
    const d1 = t.hd  * W * 2;
    const d2 = t2.hd * W * 2;

    // Only draw if on screen
    if(y1 < -50) continue;

    // ── Top face of this tier (flat roof looking down) ──
    // Trapezoidal shape: narrower at top (closer to us), wider at bottom
    const roofGrad = ctx.createLinearGradient(cx, y2, cx, y1);
    roofGrad.addColorStop(0, t.col);
    roofGrad.addColorStop(1, shadeColStr(t.col, -18));
    ctx.fillStyle = roofGrad;
    ctx.beginPath();
    ctx.moveTo(cx - w2/2, y1);
    ctx.lineTo(cx + w2/2, y1);
    ctx.lineTo(cx + w1/2, y2);  // wait — bottom is WIDER (further away = more perspective)
    ctx.lineTo(cx - w1/2, y2);
    ctx.closePath();
    ctx.fill();

    // ── Setback edge — the ledge between tiers ──
    if(i < tiers.length-1){
      const ledgeH = Math.max(2, (y1-y2)*0.04);
      ctx.fillStyle = shadeColStr(t.col, 20);
      ctx.fillRect(cx - w2/2, y1 - ledgeH, w2, ledgeH);
    }

    // ── Window grid on each tier face ──
    if(w2 > 8 && y1-y2 > 6){
      ctx.save();
      ctx.globalAlpha = 0.22;
      const cols = Math.max(2, Math.floor(w2/14));
      const rows = Math.max(1, Math.floor((y1-y2)/10));
      for(let r=0;r<rows;r++){
        for(let c=0;c<cols;c++){
          const wx = cx - w2/2 + (c+0.5)*(w2/cols);
          const wy = y2 + (r+0.5)*((y1-y2)/rows);
          const ww = w2/cols * 0.55;
          const wh = (y1-y2)/rows * 0.55;
          // window colour shifts: blue glass
          ctx.fillStyle = `hsl(210,${30+r*5}%,${55+c*3}%)`;
          ctx.fillRect(wx-ww/2, wy-wh/2, ww, wh);
        }
      }
      ctx.restore();
    }

    // ── Left + right side faces (shadow) ──
    ctx.fillStyle = `rgba(0,0,0,0.28)`;
    // Left face
    ctx.beginPath();
    ctx.moveTo(cx - w2/2, y1);
    ctx.lineTo(cx - w1/2, y2);
    ctx.lineTo(cx - w1/2 + 3, y2);
    ctx.lineTo(cx - w2/2 + 3, y1);
    ctx.closePath();
    ctx.fill();
    // Right face (highlight)
    ctx.fillStyle = `rgba(255,255,255,0.08)`;
    ctx.beginPath();
    ctx.moveTo(cx + w2/2, y1);
    ctx.lineTo(cx + w1/2, y2);
    ctx.lineTo(cx + w1/2 - 3, y2);
    ctx.lineTo(cx + w2/2 - 3, y1);
    ctx.closePath();
    ctx.fill();
  }

  // ── Central needle / antenna going down ──
  const needleW = 3.5;
  const needleBot = cy + totalDepth * 1.02;
  const needleGrad = ctx.createLinearGradient(0, cy, 0, needleBot);
  needleGrad.addColorStop(0,   '#d8dde2');
  needleGrad.addColorStop(0.15,'#a8b0b8');
  needleGrad.addColorStop(0.5, '#7a8490');
  needleGrad.addColorStop(1,   'rgba(60,70,80,0)');
  ctx.fillStyle = needleGrad;
  ctx.beginPath();
  ctx.moveTo(cx - needleW, cy);
  ctx.lineTo(cx + needleW, cy);
  ctx.lineTo(cx + needleW*0.3, needleBot);
  ctx.lineTo(cx - needleW*0.3, needleBot);
  ctx.fill();

  // Needle centre line highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(cx, needleBot * 0.6);
  ctx.stroke();

  // ── Observation deck rings ──
  const deckPositions = [0.15, 0.35, 0.55];
  for(const dp of deckPositions){
    const dy = cy + dp * totalDepth;
    const dtier = tiers.find(t=>t.y>=dp) || tiers[tiers.length-1];
    const dw = dtier.hw * W * 1.9;
    ctx.save();
    ctx.globalAlpha = 0.55;
    ctx.strokeStyle = '#c8d0d8';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(cx, dy, dw/2, dw*0.08, 0, 0, Math.PI*2);
    ctx.stroke();
    ctx.restore();
  }

  // ── Platform at very top (where player stands) ──
  const tipR = 16 + lean * 7;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(camLeanX * 0.12);

  // Platform drop shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(3, 5, tipR*1.15, tipR*0.32, 0, 0, Math.PI*2);
  ctx.fill();

  // Platform surface — small octagonal metal pad
  const platGrad = ctx.createRadialGradient(-tipR*.25, -tipR*.25, 0, 0, 0, tipR*1.3);
  platGrad.addColorStop(0,   '#e8eaec');
  platGrad.addColorStop(0.4, '#b8bec4');
  platGrad.addColorStop(1,   '#6a7278');
  ctx.fillStyle = platGrad;
  // Octagon
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a = (i/8)*Math.PI*2 - Math.PI/8;
    const px = Math.cos(a)*tipR, py = Math.sin(a)*tipR*0.36;
    i===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.fill();

  // Grip lines on platform
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 0.6;
  for(let i=-2;i<=2;i++){
    ctx.beginPath();
    ctx.moveTo(i*(tipR/2.5) - tipR*0.5, -tipR*0.12);
    ctx.lineTo(i*(tipR/2.5) + tipR*0.5,  tipR*0.12);
    ctx.stroke();
  }

  // Safety rail hint (tiny)
  ctx.strokeStyle = 'rgba(180,180,180,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(0, 0, tipR*0.92, tipR*0.3, 0, 0, Math.PI*2);
  ctx.stroke();

  // ── Player figure (top-down) ──
  ctx.translate(camLeanX*tipR*0.45, camLeanY*tipR*0.2);

  // Body shadow
  ctx.fillStyle = 'rgba(0,0,0,0.38)';
  ctx.beginPath();
  ctx.ellipse(2, 4, 8, 3, 0, 0, Math.PI*2);
  ctx.fill();

  // Jacket / body (top-down: we see shoulders + back)
  const bodyGrad = ctx.createRadialGradient(0, 3, 0, 0, 5, 12);
  bodyGrad.addColorStop(0, '#4a5a7a');
  bodyGrad.addColorStop(1, '#2a3a5a');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0, 6, 9, 5.5, 0, 0, Math.PI);
  ctx.fill();

  // Head
  const headGrad = ctx.createRadialGradient(-1.5, -1.5, 0, 0, 0, 7.5);
  headGrad.addColorStop(0, '#f5d0a8');
  headGrad.addColorStop(1, '#c8906a');
  ctx.fillStyle = headGrad;
  ctx.beginPath();
  ctx.arc(0, 0, 6.8, 0, Math.PI*2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#1a1008';
  ctx.beginPath();
  ctx.ellipse(0, -1.5, 5.5, 4.5, 0, 0, Math.PI);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(-5, 0, 2, 3.5, -0.3, 0, Math.PI);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse( 5, 0, 2, 3.5,  0.3, 0, Math.PI);
  ctx.fill();

  ctx.restore();
  ctx.restore();

  // ── Fear pulse ──
  if(lean > 0.5){
    const pulse = 0.5 + 0.5*Math.sin(Date.now()*0.014);
    ctx.fillStyle = `rgba(239,68,68,${(lean-0.5)*0.55*pulse})`;
    ctx.fillRect(0,0,W,H);
  }
}

// helper: lighten/darken a css hsl colour string by offset
function shadeColStr(col, offset){
  // parse hex #rrggbb
  const v=parseInt(col.replace('#',''),16);
  const r=Math.min(255,Math.max(0,((v>>16)&0xff)+offset));
  const g=Math.min(255,Math.max(0,((v>>8)&0xff)+offset));
  const b=Math.min(255,Math.max(0,(v&0xff)+offset));
  return `rgb(${r},${g},${b})`;
}

// ═══════════════════════════════════════════════════════════
//  PHYSICS — balance model
// ═══════════════════════════════════════════════════════════
const LEAN_GRAVITY  = 0.0045;  // tilt pulls you further off-centre
const LEAN_FRICTION = 0.975;   // inertia
const LEAN_CORRECT  = 0.012;   // gyro correction strength
const LEAN_WIND     = 0.0008;  // wind nudge
const FALL_THRESH   = 1.0;     // lean magnitude before falling

let lastTime=0;
function physicsStep(dt){
  if(!gameRunning) return;

  // Wind pushes
  camVX += windX * LEAN_WIND * dt * 60;
  camVY += windY * LEAN_WIND * dt * 60;

  // Tilt makes lean worse (leaning = unbalanced state compounds)
  camVX += camLeanX * LEAN_GRAVITY * dt * 60;
  camVY += camLeanY * LEAN_GRAVITY * dt * 60;

  // Gyro input corrects lean
  camVX -= tiltX * LEAN_CORRECT * dt * 60;
  camVY -= tiltY * LEAN_CORRECT * dt * 60;

  // Friction
  camVX *= Math.pow(LEAN_FRICTION, dt*60);
  camVY *= Math.pow(LEAN_FRICTION, dt*60);

  camLeanX += camVX;
  camLeanY += camVY;

  // Update balance bars
  const bx=Math.max(0,Math.min(100,50+camLeanX*45));
  const by=Math.max(0,Math.min(100,50+camLeanY*45));
  document.getElementById('barCursorX').style.left=bx+'%';
  document.getElementById('barCursorY').style.left=by+'%';

  // Colour bar by danger
  const danger=Math.sqrt(camLeanX**2+camLeanY**2);
  const barCol=danger<0.3?'#22c55e':danger<0.65?'#f59e0b':'#ef4444';
  document.getElementById('barCursorX').style.background=barCol;
  document.getElementById('barCursorY').style.background=barCol;

  // Check fall
  if(Math.sqrt(camLeanX**2+camLeanY**2)>FALL_THRESH){
    triggerFall();
  }
}

// ═══════════════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════════════
let survivalTimer=null;
function startSurvivalTimer(){
  survived=0;
  clearInterval(survivalTimer);
  survivalTimer=setInterval(()=>{
    if(!gameRunning) return;
    survived++;
    document.getElementById('timeDisplay').textContent=survived+'s';
    // Wind gets stronger over time
    if(survived%20===0){
      windSpeed=Math.min(80,windSpeed+5);
    }
  },1000);
}

// ═══════════════════════════════════════════════════════════
//  FALL
// ═══════════════════════════════════════════════════════════
function triggerFall(){
  if(!gameRunning) return;
  gameRunning=false;
  clearInterval(survivalTimer);
  fallAnim=1;
  if(survived>bestTime) bestTime=survived;

  // animate the fall for a second then show overlay
  const fallLoop=setInterval(()=>{
    fallAnim++;
    if(fallAnim>40){
      clearInterval(fallLoop);
      showGameOver();
    }
  },40);
}

function showGameOver(){
  document.getElementById('overBig').textContent='YOU FELL';
  document.getElementById('overSub').textContent='828 metres straight down';
  document.getElementById('overScore').textContent=survived+'s — Best: '+bestTime+'s';
  document.getElementById('overlay').classList.add('show');
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════
let animId=null;
function gameLoop(ts){
  const dt=Math.min(0.05,(ts-lastTime)/1000||0.016);
  lastTime=ts;

  updateWind(dt);
  updateWindParticles();
  physicsStep(dt);
  draw();

  animId=requestAnimationFrame(gameLoop);
}

// ═══════════════════════════════════════════════════════════
//  GYROSCOPE
// ═══════════════════════════════════════════════════════════
function attachGyro(){
  window.addEventListener('deviceorientation',e=>{
    tiltX=Math.max(-1,Math.min(1,(e.gamma||0)/30));
    tiltY=Math.max(-1,Math.min(1,((e.beta||0)-15)/30));
  },true);
  gyroEnabled=true;
}

// Keyboard fallback
const keys={};
window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',  e=>keys[e.key]=false);
function applyKeyboard(){
  if(gyroEnabled) return;
  if(keys['ArrowLeft'] ||keys['a']) tiltX=-.7;
  else if(keys['ArrowRight']||keys['d']) tiltX=.7;
  else tiltX=0;
  if(keys['ArrowUp']||keys['w']) tiltY=-.7;
  else if(keys['ArrowDown']||keys['s']) tiltY=.7;
  else tiltY=0;
}

// ═══════════════════════════════════════════════════════════
//  START / RESTART
// ═══════════════════════════════════════════════════════════
function beginGame(){
  document.getElementById('splash').style.opacity='0';
  setTimeout(()=>document.getElementById('splash').style.display='none',500);
  camLeanX=0; camLeanY=0; camVX=0; camVY=0;
  tiltX=0; tiltY=0; fallAnim=0;
  windX=0; windY=0; windSpeed=12;
  gameRunning=true;
  startSurvivalTimer();
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(gameLoop);
}

function restartGame(){
  document.getElementById('overlay').classList.remove('show');
  camLeanX=0; camLeanY=0; camVX=0; camVY=0;
  tiltX=0; tiltY=0; fallAnim=0;
  windX=0; windY=0; windSpeed=12;
  gameRunning=true;
  startSurvivalTimer();
}

document.getElementById('retryBtn').addEventListener('click',restartGame);

function requestGyroPermission(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(s=>{ if(s==='granted') attachGyro(); beginGame(); })
      .catch(()=>beginGame());
  } else {
    attachGyro(); beginGame();
  }
}

document.getElementById('startBtn').addEventListener('click',()=>{
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    document.getElementById('permBanner').classList.add('show');
  } else { requestGyroPermission(); }
});
document.getElementById('permBtn').addEventListener('click',()=>{
  document.getElementById('permBanner').classList.remove('show');
  requestGyroPermission();
});

// Pre-render loop even on splash for atmosphere
animId=requestAnimationFrame(gameLoop);
</script>
